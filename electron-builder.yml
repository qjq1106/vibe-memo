appId: com.vibe.memo
productName: Vibe Memo
directories:
  output: dist-electron
files:
  - "out/**/*"
  - "electron/**/*"
  - "!**/*.ts"
  - "!**/*.tsx"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: public/icon.icns
win:
  target:
    - nsis
    - portable
  icon: public/icon.ico
  publisherName: Vibe Memo
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Vibe Memo
linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: public/icon.png
  synapticPackageName: vibe-memo
publish:
  provider: github
  owner: your-username
  repo: vibe-memo
