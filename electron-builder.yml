appId: com.vibe.memo
productName: Vibe Memo
directories:
  output: dist-electron/release
  buildResources: public
files:
  - dist-electron/**/*
  - package.json
  - prisma/**/*
  - prisma.config.ts
extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/@prisma/**/*
  - node_modules/.prisma/**/*
win:
  target:
    - nsis
    - portable
  publisherName: Vibe Memo
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Vibe Memo
publish:
  provider: github
  owner: qjq1106
  repo: vibe-memo
